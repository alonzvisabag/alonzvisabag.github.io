<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>בחר פונט</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Assistant:wght@400;700;800&family=Rubik:wght@400;700;900&family=Rubik+Mono+One&family=Rubik+Dirt&family=Rubik+Wet+Paint&family=Secular+One&family=Suez+One&family=Frank+Ruhl+Libre:wght@400;700;900&family=Miriam+Libre:wght@400;700&family=Alef:wght@400;700&family=Varela+Round&family=David+Libre:wght@400;700&family=Bellefair&family=Noto+Serif+Hebrew:wght@400;700;900&family=Noto+Sans+Hebrew:wght@400;700;900&family=Amatic+SC:wght@700&family=Arimo:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      padding: 40px 20px;
      direction: rtl;
    }
    h1 {
      text-align: center;
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
    }
    .card {
      background: #111;
      padding: 32px 28px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .card:hover { background: #1a1a1a; }
    .card.selected { background: #1c2a1c; outline: 2px solid #4caf50; }
    .card .label {
      font-family: monospace;
      font-size: 11px;
      color: #555;
      margin-bottom: 12px;
    }
    .card .sample {
      font-size: 36px;
      line-height: 1.2;
    }
    .card .sample2 {
      font-size: 20px;
      margin-top: 6px;
      opacity: 0.6;
    }
    .card .tag {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #4caf50;
      color: #000;
      font-size: 10px;
      font-family: monospace;
      padding: 2px 8px;
      border-radius: 20px;
      display: none;
    }
    .card.selected .tag { display: block; }

    #chosen-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #4caf50;
      color: #000;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      padding: 14px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <h1>לחץ על פונט לבחור — טקסט הגיבור שלך</h1>

  <div class="grid" id="grid"></div>

  <div id="chosen-bar">✓ בחרת: <span id="chosen-name"></span> — תגיד לי את השם ואני מחליף!</div>

  <script>
    const line1 = 'מועמד שלא תשכחו';
    const line2 = 'בואו נתחיל';

    const fonts = [
      { name: 'Heebo', weight: 900, label: 'עברי — נקי ועבה מאוד' },
      { name: 'Heebo', weight: 700, label: 'עברי — נקי בינוני' },
      { name: 'Assistant', weight: 800, label: 'עברי — מודרני נקי' },
      { name: 'Rubik', weight: 900, label: 'עברי — רוביק מלא' },
      { name: 'Rubik', weight: 700, label: 'עברי — רוביק בינוני' },
      { name: 'Rubik Mono One', weight: 400, label: 'עברי — רוביק מונו' },
      { name: 'Rubik Dirt', weight: 400, label: 'עברי — רוביק עפר' },
      { name: 'Rubik Wet Paint', weight: 400, label: 'עברי — רוביק צבע רטוב' },
      { name: 'Secular One', weight: 400, label: 'עברי — יציב ועגול' },
      { name: 'Suez One', weight: 400, label: 'עברי — סריף חזק' },
      { name: 'Frank Ruhl Libre', weight: 900, label: 'עברי — עיתונאי קלאסי' },
      { name: 'Frank Ruhl Libre', weight: 700, label: 'עברי — עיתונאי בינוני' },
      { name: 'Noto Serif Hebrew', weight: 900, label: 'עברי — סריף מודרני' },
      { name: 'Noto Sans Hebrew', weight: 900, label: 'עברי — סאנס מודרני' },
      { name: 'Miriam Libre', weight: 700, label: 'עברי — מירים' },
      { name: 'David Libre', weight: 700, label: 'עברי — דוד קלאסי' },
      { name: 'Bellefair', weight: 400, label: 'עברי — אלגנטי עדין' },
      { name: 'Alef', weight: 700, label: 'עברי — אלף' },
      { name: 'Varela Round', weight: 400, label: 'עברי — עגול ורך' },
      { name: 'Amatic SC', weight: 700, label: 'עברי — כתב יד' },
    ];

    const grid = document.getElementById('grid');
    let selected = null;

    fonts.forEach(f => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="label">${f.name} ${f.weight} — ${f.label}</div>
        <div class="sample" style="font-family:'${f.name}',sans-serif;font-weight:${f.weight}">${line1}</div>
        <div class="sample2" style="font-family:'${f.name}',sans-serif;font-weight:${f.weight}">${line2}</div>
        <div class="tag">✓ נבחר</div>
      `;
      card.addEventListener('click', () => {
        if (selected) selected.classList.remove('selected');
        card.classList.add('selected');
        selected = card;
        document.getElementById('chosen-name').textContent = f.name + ' (' + f.label + ')';
        document.getElementById('chosen-bar').style.display = 'block';
      });
      grid.appendChild(card);
    });
  </script>
</body>
</html>
