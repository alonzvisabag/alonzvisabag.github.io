<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>בחר פונט</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Space+Grotesk:wght@700&family=Syne:wght@700;800&family=Bebas+Neue&family=Fraunces:wght@700&family=DM+Serif+Display&family=Cormorant+Garamond:wght@700&family=Abril+Fatface&family=Righteous&family=Josefin+Sans:wght@700&family=Raleway:wght@800&family=Oswald:wght@700&family=Nunito:wght@900&family=Exo+2:wght@800&family=Kanit:wght@700&family=Secular+One&family=Heebo:wght@900&family=Assistant:wght@800&family=Rubik+Mono+One&family=Rubik+Dirt&family=Rubik+Gemstones&family=Rubik+Wet+Paint&family=Boogaloo&family=Lobster&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      padding: 40px 20px;
      direction: rtl;
    }
    h1 {
      text-align: center;
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
    }
    .card {
      background: #111;
      padding: 32px 28px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .card:hover { background: #1a1a1a; }
    .card.selected { background: #1c2a1c; outline: 2px solid #4caf50; }
    .card .label {
      font-family: monospace;
      font-size: 11px;
      color: #555;
      margin-bottom: 12px;
    }
    .card .sample {
      font-size: 36px;
      line-height: 1.2;
    }
    .card .sample2 {
      font-size: 20px;
      margin-top: 6px;
      opacity: 0.6;
    }
    .card .tag {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #4caf50;
      color: #000;
      font-size: 10px;
      font-family: monospace;
      padding: 2px 8px;
      border-radius: 20px;
      display: none;
    }
    .card.selected .tag { display: block; }

    #chosen-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #4caf50;
      color: #000;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      padding: 14px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <h1>לחץ על פונט לבחור — טקסט הגיבור שלך</h1>

  <div class="grid" id="grid"></div>

  <div id="chosen-bar">✓ בחרת: <span id="chosen-name"></span> — תגיד לי את השם ואני מחליף!</div>

  <script>
    const line1 = 'מועמד שלא תשכחו';
    const line2 = 'בואו נתחיל';

    const fonts = [
      { name: 'Playfair Display', label: 'אלגנטי קלאסי' },
      { name: 'DM Serif Display', label: 'סריף נקי' },
      { name: 'Cormorant Garamond', label: 'וינטג\' עדין' },
      { name: 'Fraunces', label: 'וינטג\' עם אופי' },
      { name: 'Abril Fatface', label: 'דרמטי ועבה' },
      { name: 'Space Grotesk', label: 'מודרני טכנולוגי' },
      { name: 'Syne', label: 'גיאומטרי יוצא דופן' },
      { name: 'Bebas Neue', label: 'דרמטי, כל גדולות' },
      { name: 'Righteous', label: 'רטרו גיאומטרי' },
      { name: 'Josefin Sans', label: 'מינימליסטי נקי' },
      { name: 'Raleway', label: 'אלגנטי ודק' },
      { name: 'Oswald', label: 'חזק וצפוף' },
      { name: 'Exo 2', label: 'עתידני' },
      { name: 'Kanit', label: 'תאילנדי-מודרני' },
      { name: 'Nunito', label: 'עגול וידידותי' },
      { name: 'Boogaloo', label: 'מצחיק ומשוחרר' },
      { name: 'Lobster', label: 'כתב יד מסולסל' },
      { name: 'Secular One', label: 'עברי-ידידותי' },
      { name: 'Heebo', label: 'עברי נקי ועבה' },
      { name: 'Assistant', label: 'עברי מודרני' },
      { name: 'Rubik Mono One', label: 'רוביק מונו' },
      { name: 'Rubik Dirt', label: 'רוביק עפר' },
      { name: 'Rubik Wet Paint', label: 'רוביק צבע רטוב' },
    ];

    const grid = document.getElementById('grid');
    let selected = null;

    fonts.forEach(f => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="label">${f.name} — ${f.label}</div>
        <div class="sample" style="font-family:'${f.name}',sans-serif">${line1}</div>
        <div class="sample2" style="font-family:'${f.name}',sans-serif">${line2}</div>
        <div class="tag">✓ נבחר</div>
      `;
      card.addEventListener('click', () => {
        if (selected) selected.classList.remove('selected');
        card.classList.add('selected');
        selected = card;
        document.getElementById('chosen-name').textContent = f.name + ' (' + f.label + ')';
        document.getElementById('chosen-bar').style.display = 'block';
      });
      grid.appendChild(card);
    });
  </script>
</body>
</html>
