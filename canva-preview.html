<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>תצוגת עיצובים</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; font-family: sans-serif; padding: 30px; }
    h2 { text-align: center; margin-bottom: 24px; font-size: 20px; color: #333; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .card img { width: 100%; display: block; }
    .card .label { padding: 12px; font-size: 13px; color: #666; text-align: center; }
    .card a { display: block; text-align: center; padding: 10px; background: #6c63ff; color: #fff; font-size: 13px; text-decoration: none; }
    .card a:hover { background: #574fd6; }
  </style>
</head>
<body>
  <h2>שום כלום — 4 אופציות מ-Canva</h2>
  <div class="grid">
    <div class="card">
      <img src="https://design.canva.ai/4J7gqqoER2GGRBC" alt="אופציה 1">
      <div class="label">אופציה 1</div>
      <a href="https://www.canva.com/d/f2psrYpj9S9U9Jz" target="_blank">פתח ב-Canva</a>
    </div>
    <div class="card">
      <img src="https://design.canva.ai/cm3m-9ECJray3Pe" alt="אופציה 2">
      <div class="label">אופציה 2</div>
      <a href="https://www.canva.com/d/mqjePYmDLAYYu-B" target="_blank">פתח ב-Canva</a>
    </div>
    <div class="card">
      <img src="https://design.canva.ai/iQTF5wV11wCwG6V" alt="אופציה 3">
      <div class="label">אופציה 3</div>
      <a href="https://www.canva.com/d/FGKfMhRFFnt2PV9" target="_blank">פתח ב-Canva</a>
    </div>
    <div class="card">
      <img src="https://design.canva.ai/qhbp3Y75Wg01XIW" alt="אופציה 4">
      <div class="label">אופציה 4</div>
      <a href="https://www.canva.com/d/DN_R7maO_YbuMqu" target="_blank">פתח ב-Canva</a>
    </div>
  </div>
</body>
</html>
